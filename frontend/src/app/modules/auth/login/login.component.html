<div class="login-container">
  <div class="login-card">
    <h2>Task Manager Login</h2>
    <p class="subtitle">Sign in to continue</p>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="you@example.com"
          [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        <div class="error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Valid email is required
        </div>
      </div>
      
      <div class="form-group">
        <a routerLink="/forgot-password">Forgot password?</a>
        <label for="password">Password</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password"
          [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        <div class="error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Password is required
        </div>
      </div>
      
      <button 
        type="submit" 
        [disabled]="loginForm.invalid || loading" 
        class="submit-btn">
        {{ loading ? "Signing in..." : "Sign In" }}
      </button>
    </form>
    
    <div class="register-link">
      <p>New to Task Manager? <a routerLink="/register">Create account</a></p>
    </div>
  </div>
</div>
